<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <div class="border mt-4">
            <div class="h3 bg-secondary-subtle p-3 mb-0">
                Payment form example
            </div>
            <div class="p-4">
                <form action="" class="row needs-validation" novalidate>
                    <div class="alert alert-danger" role="alert">Some fields are missing
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="card" class="form-label">Card #</label>
                        <input type="number" class="form-control" name="card" id="card" placeholder="XXXXXXXXXXXXX"
                            required>
                        <!-- <div class="valid-feedback">Looks good!</div> -->
                        <!-- <div class="invalid-feedback">Please insert a Name.</div> -->
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="CVC" class="form-label">CVC #</label>
                        <input type="number" class="form-control" name="cvc" id="cvc" placeholder="0000">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <div class="input-group">
                            <span class="input-group-text">€</span>
                            <input type="number" class="form-control" name="amount" id="amount" placeholder="Amount"
                                required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="firstname" class="form-label">First Name</label>
                        <input type="text" class="form-control" name="firstname" id="firstname" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="lastname" class="form-label">Last Name</label>
                        <input type="lastname" class="form-control" name="lastname" id="lastname" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="city" class="form-label">City</label>
                        <input type="city" class="form-control" name="city" id="city" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="country" class="form-label">State</label>
                        <select class="form-select" aria-label="Default select example">
                            <option selected disabled>Pick a state</option>
                            <option value="1">Portugal</option>
                            <option value="2">Spain</option>
                            <option value="3">France</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="zip" class="form-label">Postal Code</label>
                        <input type="zip" class="form-control" name="zip" id="zip" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cards" class="form-label">We accept:</label>
                        <div class="bg-secondary p-1 gap-3" style="width: fit-content">
                            <div class="form-check form-check-inline">
                                <input type="radio" class="form-check-input" id="visa" value="visa" name="cards">
                                <label for="form-check-label" for="visa"><i class="fa-brands fa-cc-visa fa-lg"
                                        style="color:white;"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" class="form-check-input" id="mastercard" value="mastercard"
                                    name="cards">
                                <label for="form-check-label" for="mastercard"><i
                                        class="fa-brands fa-cc-mastercard fa-lg" style="color:white;"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" class="form-check-input" id="diners" value="diners" name="cards">
                                <label for="form-check-label" for="diners"><i class="fa-brands fa-cc-diners-club fa-lg"
                                        style="color:white;"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" class="form-check-input" id="amex" value="amex" name="cards">
                                <label for="form-check-label" for="amex"><i class="fa-brands fa-cc-amex fa-lg"
                                        style="color:white;"></i></label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="message" class="form-label">Message</label>
                        <input type="message" class="form-control" style="height: 100px" name="message" id="message">
                        <div id="messageHelp" class="form-text">Add any notes here.</div>
                    </div>
            </div>
            <div class=" bg-secondary-subtle p-2 border-top">
                <div class="row justify-content-end gap-2">
                    <div class="col-12 col-md-auto">
                        <button class="btn btn-secondary w-100 w-md-auto" type="button">Cancel</button>
                    </div>
                    <div class="col-12 col-md-auto">
                        <button class="btn btn-primary w-100 w-md-auto" type="submit">Send</button>
                    </div>
                </div>
            </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>// Example starter JavaScript for disabling form submissions if there are invalid fields
        (() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }

                    form.classList.add('was-validated')
                }, false)
            })
        })()</script>
</body>

</html>
